<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Explorer - Offline View</title>
    <style>
        :root {
            --bg-dark: #191919;
            --bg-hover: #2b2b2b;
            --text-main: #cccccc;
            --text-muted: #888888;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        .toolbar {
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--border-color);
            background-color: #202020;
        }

        .btn {
            background: #2b2b2b;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn:hover {
            background-color: #3b3b3b;
        }

        .btn:disabled {
            color: #555;
            cursor: not-allowed;
            border-color: #222;
            background: transparent;
        }

        select.btn {
            padding: 4px 10px;
            appearance: none;
            outline: none;
            width: auto;
        }

        .address-bar {
            flex: 1;
            display: flex;
            background-color: #111111;
            border: 1px solid #444;
            padding: 4px 10px;
            border-radius: 3px;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            min-height: 22px;
        }

        .address-part {
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 2px;
        }

        .address-part:hover {
            background-color: #333;
        }

        .list-header,
        .row {
            display: grid;
            grid-template-columns: 2.5fr 1fr 1fr 1fr 1fr;
            padding: 6px 15px;
            font-size: 13px;
            align-items: center;
        }

        .list-header {
            border-bottom: 1px solid var(--border-color);
            color: var(--text-muted);
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .flex-list {
            flex: 1;
            overflow-y: auto;
        }

        .row {
            border-bottom: 1px solid transparent;
            cursor: pointer;
        }

        .row:hover {
            background-color: var(--bg-hover);
        }

        .col-name {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .col-size {
            text-align: right;
        }

        .icon {
            font-size: 16px;
            min-width: 16px;
            text-align: center;
        }

        /* Tree View Styles */
        .tree-container {
            padding: 10px 0;
        }

        .tree-row {
            display: flex;
            flex-direction: column;
        }

        .tree-item {
            display: flex;
            align-items: center;
            padding: 4px 15px;
            font-size: 13px;
            cursor: pointer;
        }

        .tree-item:hover {
            background-color: var(--bg-hover);
        }

        .tree-toggle {
            display: inline-block;
            width: 20px;
            text-align: center;
            color: #ccc;
            font-size: 12px;
            user-select: none;
            transition: transform 0.2s;
        }

        .tree-toggle.open {
            transform: rotate(90deg);
        }

        .tree-name {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .tree-details {
            color: var(--text-muted);
            font-size: 12px;
            text-align: right;
            min-width: 280px;
            display: flex;
            justify-content: flex-end;
            gap: 20px;
        }

        .tree-children {
            display: none;
        }

        .drop-zone {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            z-index: 999;
            display: none;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .row {
            border: 1px solid transparent; /* Prepare for selected state outline */
        }
        .row.selected {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        /* Context Menu */
        .context-menu {
            position: fixed;
            background: #2b2b2b;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 4px 0;
            min-width: 150px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none;
            z-index: 1000;
            color: #ccc;
        }
        .context-menu-item {
            padding: 6px 15px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .context-menu-item:hover {
            background: #444;
        }

        /* Properties Dialog */
        .dialog-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: transparent;
            display: none;
            z-index: 1000;
        }
        .dialog {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 360px;
            background-color: #f0f0f0;
            color: #000;
            border-radius: 6px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            border: 1px solid #aaa;
        }
        .dialog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #ffffff;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
        }
        .dialog-title {
            font-size: 13px;
            color: #000;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .dialog-close {
            cursor: pointer;
            font-size: 14px;
            color: #333;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
        }
        .dialog-close:hover { background: #e81123; color: white; }
        .dialog-content {
            background: #ffffff;
            flex: 1;
            padding: 0;
            margin: 0;
        }
        .dialog-tabs {
            display: flex;
            border-bottom: 1px solid #d9d9d9;
            padding: 0 2px;
            margin: 0 10px;
        }
        .dialog-tab {
            padding: 4px 10px;
            font-size: 12px;
            border: 1px solid transparent;
            cursor: default;
            margin-bottom: -1px;
            color: #000;
        }
        .dialog-tab.active {
            background: #fff;
            border: 1px solid #d9d9d9;
            border-bottom-color: #fff;
            border-top-color: #0078d7;
            border-radius: 2px 2px 0 0;
        }
        .dialog-body {
            padding: 15px;
            font-size: 12px;
        }
        .info-row {
            display: flex;
            margin-bottom: 10px;
        }
        .info-label {
            width: 90px;
            color: #333;
        }
        .info-value {
            flex: 1;
            color: #000;
            word-break: break-all;
        }
        .hr {
            height: 1px;
            background: #d9d9d9;
            margin: 15px 0;
        }
        .dialog-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 12px;
            background: #f0f0f0;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
            border-top: 1px solid #d9d9d9;
        }
        .dialog-btn {
            padding: 4px 15px;
            border: 1px solid #adadad;
            background: #e1e1e1;
            border-radius: 4px;
            cursor: default;
            font-size: 12px;
            color: #000;
        }
        .dialog-btn:hover { background: #e5f1fb; border-color: #0078d7; }
    </style>
</head>

<body>
    <div class="toolbar">
        <button class="btn" id="btn-up" title="Up to higher level">↑ Up</button>
        <button class="btn" id="btn-home" onclick="goHome()" title="Root">🏠 Home</button>
        <div class="address-bar" id="address-bar"></div>
        <select class="btn" id="view-mode" onchange="changeViewMode(this.value)">
            <option value="explorer">🗂️ Explorer View</option>
            <option value="tree">🌳 Tree View</option>
        </select>
    </div>

    <div class="list-header" id="list-header">
        <div>Name</div>
        <div>Date modified</div>
        <div>Type</div>
        <div class="col-size">Total Size</div>
        <div class="col-size">Contains</div>
    </div>

    <div class="flex-list" id="file-list"></div>

    <div class="drop-zone" id="drop-zone">Drop structure.json here!</div>

    <div id="context-menu" class="context-menu">
        <div class="context-menu-item" onclick="showProperties()">⚙️ Properties</div>
    </div>

    <div id="dialog-overlay" class="dialog-overlay">
        <div class="dialog">
            <div class="dialog-header">
                <div class="dialog-title" id="prop-title">Properties</div>
                <div class="dialog-close" onclick="closeProperties()">✕</div>
            </div>
            <div class="dialog-content">
                <div class="dialog-tabs">
                    <div class="dialog-tab active">General</div>
                </div>
                <div class="dialog-body">
                    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
                        <div id="prop-icon" style="font-size: 32px; width: 40px; text-align: center;">📁</div>
                        <input type="text" id="prop-name" readonly style="flex: 1; padding: 4px; border: 1px solid #ccc;">
                    </div>
                    <div class="hr"></div>
                    <div class="info-row">
                        <div class="info-label">Type:</div>
                        <div class="info-value" id="prop-type">File folder</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Location:</div>
                        <div class="info-value" id="prop-location">C:\</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Size:</div>
                        <div class="info-value" id="prop-size">0 bytes</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Size on disk:</div>
                        <div class="info-value" id="prop-size-disk">0 bytes</div>
                    </div>
                    <div class="info-row" id="prop-contains-row">
                        <div class="info-label">Contains:</div>
                        <div class="info-value" id="prop-contains">0 Files, 0 Folders</div>
                    </div>
                    <div class="hr"></div>
                    <div class="info-row">
                        <div class="info-label">Created:</div>
                        <div class="info-value" id="prop-date">Monday...</div>
                    </div>
                </div>
            </div>
            <div class="dialog-footer">
                <button class="dialog-btn" onclick="closeProperties()" style="min-width: 70px;">OK</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // DATA PLACEHOLDER
        // ==========================================
        const fileData = [];
        // ==========================================

        let currentPath = "";
        let currentViewMode = "explorer";

        function goHome() {
            if (currentViewMode === 'explorer') {
                renderList("");
            }
        }

        function changeViewMode(mode) {
            currentViewMode = mode;
            const addressBar = document.getElementById('address-bar');
            const btnUp = document.getElementById('btn-up');
            const listHeader = document.getElementById('list-header');
            const btnHome = document.getElementById('btn-home');

            if (mode === 'tree') {
                addressBar.style.visibility = 'hidden';
                btnUp.style.display = 'none';
                btnHome.style.display = 'none';
                listHeader.style.display = 'none';
                renderTreeRoot();
            } else {
                addressBar.style.visibility = 'visible';
                btnUp.style.display = 'inline-block';
                btnHome.style.display = 'inline-block';
                listHeader.style.display = 'grid';
                renderList(currentPath);
            }
        }

        function renderData() {
            if (currentViewMode === 'tree') {
                renderTreeRoot();
            } else {
                renderList(currentPath);
            }
        }

        // ==========================================
        // EXPLORER VIEW LOGIC
        // ==========================================
        function renderList(path) {
            currentPath = path;
            const listContainer = document.getElementById('file-list');
            listContainer.innerHTML = '';

            // Update Address Bar
            const addressBar = document.getElementById('address-bar');
            addressBar.innerHTML = '';
            const parts = path.split('/').filter(p => p);

            let bcHTML = `<span class="address-part" onclick="renderList('')">Root</span>`;
            let currentBcPath = "";
            parts.forEach((p, index) => {
                currentBcPath += currentBcPath ? '/' + p : p;
                bcHTML += `<span style="color:#666; margin: 0 4px;">></span><span class="address-part" onclick="renderList('${currentBcPath}')">${p}</span>`;
            });
            addressBar.innerHTML = bcHTML;

            // Update Up Button
            const btnUp = document.getElementById('btn-up');
            btnUp.disabled = !path;
            btnUp.onclick = () => {
                if (!path) return;
                let newParts = path.split('/');
                newParts.pop();
                renderList(newParts.join('/'));
            };

            // Filter files
            const items = fileData.filter(f => f.ParentPath === path);

            if (items.length === 0 && fileData.length === 0) {
                showEmptyPlaceholder(listContainer);
                return;
            }

            if (items.length === 0 && fileData.length > 0) {
                listContainer.innerHTML = `<div style="padding: 30px; text-align: center; color: #888; font-size: 14px;">This folder is empty.</div>`;
                return;
            }

            sortItems(items);

            items.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'row';
                
                row.onclick = (e) => {
                    document.querySelectorAll('.row').forEach(r => r.classList.remove('selected'));
                    row.classList.add('selected');
                };

                row.ondblclick = () => {
                    document.querySelectorAll('.row').forEach(r => r.classList.remove('selected'));
                    if (item.IsFolder) renderList(item.Path);
                };
                
                row.oncontextmenu = (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.row').forEach(r => r.classList.remove('selected'));
                    row.classList.add('selected');
                    contextItem = item;
                    
                    const menu = document.getElementById('context-menu');
                    menu.style.display = 'block';
                    menu.style.left = e.pageX + 'px';
                    menu.style.top = e.pageY + 'px';
                };

                let icon = item.IsFolder ? '📁' : getFileIcon(item.Name);
                let type = item.IsFolder ? 'File folder' : getExtension(item.Name) + ' File';
                let dateStr = item.DateModified || '';
                
                let sizeStr = '';
                let containsStr = '';

                if (item.IsFolder) {
                    sizeStr = formatBytesExact(item.TotalSize);
                    containsStr = formatNumber(item.FilesCount) + ' Files, ' + formatNumber(item.FoldersCount) + ' Folders';
                } else {
                    sizeStr = formatBytesExact(item.Size);
                    containsStr = '-';
                }

                row.innerHTML = `
                    <div class="col-name"><span class="icon">${icon}</span>${item.Name}</div>
                    <div>${dateStr}</div>
                    <div>${type}</div>
                    <div class="col-size">${sizeStr}</div>
                    <div class="col-size" style="text-align: right; color: #aaa;">${containsStr}</div>
                `;
                listContainer.appendChild(row);
            });
        }

        // ==========================================
        // TREE VIEW LOGIC
        // ==========================================
        function renderTreeRoot() {
            const listContainer = document.getElementById('file-list');
            listContainer.innerHTML = '';

            if (fileData.length === 0) {
                showEmptyPlaceholder(listContainer);
                return;
            }

            const rootUl = document.createElement('div');
            rootUl.className = 'tree-container';

            renderTreeNodes("", rootUl, 0);
            listContainer.appendChild(rootUl);
        }

        function renderTreeNodes(path, container, level) {
            const items = fileData.filter(f => f.ParentPath === path);
            sortItems(items);

            items.forEach(item => {
                const row = document.createElement('div');
                row.className = 'tree-row';

                const indent = `<span style="display:inline-block; width:${level * 20}px"></span>`;
                let toggle = `<span class="tree-toggle" style="visibility:hidden">▶</span>`;

                let hasChildren = false;
                if (item.IsFolder) {
                    hasChildren = fileData.some(f => f.ParentPath === item.Path);
                    if (hasChildren) {
                        toggle = `<span class="tree-toggle">▶</span>`;
                    }
                }

                let icon = item.IsFolder ? '📁' : getFileIcon(item.Name);
                let sizeStr = (item.IsFolder || item.Size == null) ? '' : formatBytes(item.Size);
                let dateStr = item.DateModified || '';

                const nodeHTML = `
                    <div class="tree-item" data-path="${item.Path}" data-loaded="false" data-open="false">
                        ${indent}
                        ${toggle}
                        <span class="tree-name"><span class="icon">${icon}</span>${item.Name}</span>
                        <div class="tree-details">
                            <span style="width: 120px; text-align: right;">${dateStr}</span>
                            <span style="width: 80px; text-align: right;">${sizeStr}</span>
                        </div>
                    </div>
                    <div class="tree-children"></div>
                `;
                row.innerHTML = nodeHTML;

                const itemDiv = row.querySelector('.tree-item');
                itemDiv.onclick = (e) => {
                    if (item.IsFolder && hasChildren) {
                        const isOpen = itemDiv.getAttribute('data-open') === 'true';
                        const isLoaded = itemDiv.getAttribute('data-loaded') === 'true';
                        const childrenDiv = row.querySelector('.tree-children');
                        const toggleSpan = row.querySelector('.tree-toggle');

                        if (isOpen) {
                            childrenDiv.style.display = 'none';
                            itemDiv.setAttribute('data-open', 'false');
                            toggleSpan.classList.remove('open');
                        } else {
                            if (!isLoaded) {
                                renderTreeNodes(item.Path, childrenDiv, level + 1);
                                itemDiv.setAttribute('data-loaded', 'true');
                            }
                            childrenDiv.style.display = 'block';
                            itemDiv.setAttribute('data-open', 'true');
                            toggleSpan.classList.add('open');
                        }
                    }
                };

                container.appendChild(row);
            });
        }

        // ==========================================
        // CONTEXT MENU & PROPERTIES
        // ==========================================
        let contextItem = null;
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('context-menu');
            if (menu) menu.style.display = 'none';
        });

        // Add context menu logic for Tree View as well
        document.addEventListener('contextmenu', (e) => {
            const treeItem = e.target.closest('.tree-item');
            if (treeItem) {
                e.preventDefault();
                const path = treeItem.getAttribute('data-path');
                const item = fileData.find(f => f.Path === path);
                if (item) {
                    contextItem = item;
                    const menu = document.getElementById('context-menu');
                    menu.style.display = 'block';
                    menu.style.left = e.pageX + 'px';
                    menu.style.top = e.pageY + 'px';
                }
            }
        });

        function showProperties() {
            if (!contextItem) return;
            const item = contextItem;
            
            document.getElementById('prop-title').innerText = item.Name + ' Properties';
            document.getElementById('prop-name').value = item.Name;
            document.getElementById('prop-icon').innerText = item.IsFolder ? '📁' : getFileIcon(item.Name);
            document.getElementById('prop-type').innerText = item.IsFolder ? 'File folder' : (getExtension(item.Name) + ' File');
            document.getElementById('prop-location').innerText = item.ParentPath ? ('Local Disk:\\' + item.ParentPath.replace(/\//g, '\\')) : 'Local Disk:\\';
            document.getElementById('prop-date').innerText = item.DateModified || 'Unknown';
            
            const containsRow = document.getElementById('prop-contains-row');
            if (item.IsFolder) {
                document.getElementById('prop-size').innerText = formatBytesExact(item.TotalSize) + ' (' + formatNumber(item.TotalSize) + ' bytes)';
                document.getElementById('prop-size-disk').innerText = formatBytesExact(item.TotalSize) + ' (' + formatNumber(item.TotalSize) + ' bytes)';
                document.getElementById('prop-contains').innerText = formatNumber(item.FilesCount) + ' Files, ' + formatNumber(item.FoldersCount) + ' Folders';
                containsRow.style.display = 'flex';
            } else {
                document.getElementById('prop-size').innerText = formatBytesExact(item.Size) + ' (' + formatNumber(item.Size) + ' bytes)';
                document.getElementById('prop-size-disk').innerText = formatBytesExact(item.Size) + ' (' + formatNumber(item.Size) + ' bytes)';
                containsRow.style.display = 'none';
            }
            
            document.getElementById('dialog-overlay').style.display = 'block';
        }
        
        function closeProperties() {
            document.getElementById('dialog-overlay').style.display = 'none';
        }
        
        function formatBytesExact(bytes) {
            if (bytes === 0) return '0 bytes';
            const k = 1024;
            const sizes = ['bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            if (i === 0) return bytes + ' bytes';
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatNumber(num) {
            return (num || 0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // ==========================================
        // HELPERS
        // ==========================================
        function sortItems(items) {
            items.sort((a, b) => {
                if (a.IsFolder && !b.IsFolder) return -1;
                if (!a.IsFolder && b.IsFolder) return 1;
                return a.Name.toLowerCase().localeCompare(b.Name.toLowerCase());
            });
        }

        function showEmptyPlaceholder(container) {
            container.innerHTML = `<div style="padding: 30px; text-align: center; color: #888; font-size: 14px; line-height: 1.5;">
                <b>No data loaded yet.</b><br><br>
                To view your files, you can <b>Drag & Drop</b> your <code>structure.json</code> file anywhere on this window.<br><br>
                Or, use the provided PowerShell script which will automatically generate a new HTML file with data populated.
            </div>`;
        }

        function getExtension(filename) {
            const parts = filename.split('.');
            return parts.length > 1 ? parts.pop().toUpperCase() : 'File';
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'pdf': '📕',
                'txt': '📄', 'md': '📄', 'csv': '📄',
                'doc': '📘', 'docx': '📘',
                'xls': '📗', 'xlsx': '📗',
                'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️',
                'zip': '📦', 'rar': '📦', '7z': '📦', 'tar': '📦', 'gz': '📦',
                'json': '📜', 'html': '🌐', 'js': '📜', 'css': '🎨', 'php': '🐘', 'py': '🐍',
                'xml': '📜', 'yml': '⚙️', 'yaml': '⚙️', 'ini': '⚙️', 'conf': '⚙️',
                'exe': '⚙️', 'bat': '⚙️', 'ps1': '⚙️', 'sh': '⚙️'
            };
            return icons[ext] || '📄';
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 KB';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            if (i === 0) return bytes + ' Bytes';
            return parseFloat((bytes / Math.pow(k, i)).toFixed(0)) + ' ' + sizes[i];
        }

        // Drag and Drop Logic for structure.json
        const dz = document.getElementById('drop-zone');
        document.body.ondragover = e => {
            e.preventDefault();
            dz.style.display = 'flex';
        };
        document.body.ondragleave = e => {
            dz.style.display = 'none';
        };
        document.body.ondrop = e => {
            e.preventDefault();
            dz.style.display = 'none';

            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.json')) {
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (Array.isArray(data)) {
                            fileData.length = 0;
                            fileData.push(...data);
                            renderData();
                        } else {
                            alert('Invalid JSON structure. Expected an array of files.');
                        }
                    } catch (err) {
                        alert('Error parsing JSON file: ' + err.message);
                    }
                };
                reader.readAsText(file);
            } else {
                alert('Please drop a valid .json file (e.g., structure.json).');
            }
        };

        // Initial Render
        renderData();
    </script>
</body>

</html>
